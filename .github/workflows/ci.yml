name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.18"
            otp: "27"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/folio_nif -> target

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - uses: actions/cache@v4
        with:
          path: _build/dev/dialyxir*.plt
          key: plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get

      - name: CI checks
        run: mix ci
